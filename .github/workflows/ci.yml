name: CI

on:
  pull_request:
    branches: [main]

jobs:
  validate-infra:
    name: Validate CDK Infrastructure
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/infra

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: src/infra/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Synth CDK app
        run: npm run synth -- -c env=prod
        env:
          AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
          AWS_DEFAULT_REGION: ${{ vars.AWS_REGION }}

  validate-lambdas:
    name: Validate Lambda Code
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/lambdas

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: src/lambdas/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Run tests
        run: npm test

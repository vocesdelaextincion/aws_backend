name: Deploy Lambdas

on:
  push:
    branches: [main]
    paths:
      - 'src/lambdas/**'
      - '.github/workflows/deploy-lambdas.yml'

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy Lambda Code to Prod
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: src/lambdas

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: src/lambdas/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_PROD }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Deploy via CDK (Lambda code update)
        working-directory: src/infra
        run: |
          npm ci
          npm run deploy -- voces-prod-api -c env=prod --require-approval never
        env:
          AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
